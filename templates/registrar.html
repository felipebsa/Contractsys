<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <title>Registrar - Contractsys</title>
</head>
<body>
    <nav>
        <a href="/">Home</a>
        <hr>
        <a href="/cadastrar">Cadastrar Contrato</a>
        <hr>
        <a href="/listar">Listar Contratos</a>
        <hr>
        <a href="/status">Status dos Contratos</a>
        <hr>
    </nav>

    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-header">
                <h2>Contractsys</h2>
                <p>Criar nova conta</p>
            </div>
            <form method="POST" action="/registrar">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" name="username" id="username" required placeholder="Escolha um username">
                </div>
                <div class="form-group">
                    <label for="user_password">Senha</label>
                    <input type="password" name="user_password" id="user_password" required placeholder="Escolha uma senha">
                </div>
                <button type="submit" class="btn-auth btn-auth-register">Registrar</button>
                <p class="auth-link">Já tem conta? <a href="/login">Entrar</a></p>
            </form>
        </div>
    </div>
</body>
</html>
